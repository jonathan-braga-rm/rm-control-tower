<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RM LatAm — Control Tower</title>
<style>
  :root{
    --bg:#0c1220;--panel:#131c2e;--panel2:#182338;--line:#24314c;
    --tx:#dbe4f2;--tx2:#8fa0bc;--tx3:#5f6f8d;
    --red:#ff5c6c;--amber:#ffb454;--green:#3ddc97;--blue:#4da3ff;--purple:#b48cff;--gray:#7a8699;
    --shadow:rgba(0,0,0,.5);
  }
  body.light{
    --bg:#eef1f7;--panel:#ffffff;--panel2:#f4f7fc;--line:#d8e0ea;
    --tx:#17212f;--tx2:#516079;--tx3:#8291a7;
    --red:#d63a49;--amber:#c47d16;--green:#12915f;--blue:#2f6fd0;--purple:#7a5fc0;--gray:#7a8699;
    --shadow:rgba(30,45,70,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font:14px/1.45 "Segoe UI",system-ui,Arial,sans-serif;min-height:100vh;transition:background .2s,color .2s}
  .top{display:flex;align-items:center;gap:16px;padding:14px 26px;background:linear-gradient(90deg,#101a2c,#0d1526);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#2f6fd0,#4da3ff);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .logo h1{font-size:16px;font-weight:700;letter-spacing:.6px;color:#fff}.logo h1 span{color:#4da3ff}
  .logo small{display:block;color:#8fa3c2;font-size:11px}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .top .meta{text-align:right;font-size:11px;color:#8fa3c2}.top .meta b{color:#dbe4f2}
  .themebtn{cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#dbe4f2;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;white-space:nowrap}
  .themebtn:hover{background:rgba(255,255,255,.16)}
  .modeflag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:700;letter-spacing:.5px;margin-left:8px}
  .flag-admin{background:rgba(180,140,255,.22);color:#c3a8f7;border:1px solid rgba(180,140,255,.4)}
  .flag-view{background:rgba(77,163,255,.2);color:#79b0f5;border:1px solid rgba(77,163,255,.4)}
  .wrap{max-width:1400px;margin:0 auto;padding:20px 26px 80px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,var(--blue))}
  .kpi .v{font-size:30px;font-weight:800;color:var(--c,var(--blue));line-height:1.1}
  .kpi .l{font-size:10.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .tab{padding:9px 20px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--tx2);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  .tab:hover{color:var(--tx);border-color:#33436a}
  .tab.on{background:linear-gradient(135deg,#2f6fd0,#3b82e0);color:#fff;border-color:transparent}
  .tab .b{display:inline-block;min-width:20px;padding:1px 6px;border-radius:99px;background:rgba(128,128,128,.22);font-size:11px;margin-left:6px}
  .tab .pend{background:var(--amber);color:#101a2c}
  .btn{padding:9px 18px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--tx);cursor:pointer;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--blue)}
  .btn.primary{background:linear-gradient(135deg,#2f6fd0,#3b82e0);border-color:transparent;color:#fff}
  .btn.green{background:linear-gradient(135deg,#1e9e6a,#2bbd80);border-color:transparent;color:#fff}
  .btn.ghost{background:transparent}.btn.sm{padding:5px 12px;font-size:12px}
  .btn.big{padding:11px 22px;font-size:14px}
  .btn.danger{color:#fff;background:linear-gradient(135deg,#c53442,#ff5c6c);border-color:transparent}
  .btn.dangerghost{color:var(--red);border-color:rgba(214,58,73,.5);background:transparent}
  .actbar{margin-left:auto;display:flex;gap:8px;align-items:center}
  .savehint{font-size:11px;color:var(--amber);font-weight:600}
  .toggle{cursor:pointer;font-size:12px;color:var(--tx2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-weight:600}
  .toggle.on{color:var(--amber);border-color:var(--amber)}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:18px}
  .chip{padding:6px 14px;border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:600}
  .chip.on{color:#fff;border-color:transparent}
  .chip[data-p="TODAS"].on{background:#33436a}.chip[data-p="ANDINA"].on{background:#2f6fd0}
  .chip[data-p="SOUTH CONE"].on{background:#1e9e6a}.chip[data-p="MEXICO & CARIBBEAN"].on{background:#c8862c}.chip[data-p="CORP"].on{background:#7a5fc0}
  select,input[type=text],input[type=date],input[type=number],textarea{background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:7px 10px;font-size:12.5px;outline:none;font-family:inherit}
  input[type=text]{min-width:200px}textarea{width:100%;min-height:60px;resize:vertical}
  select:focus,input:focus,textarea:focus{border-color:var(--blue)}
  .filters .spacer{flex:1}.filters .count{font-size:12px;color:var(--tx3)}
  .sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:16px;overflow:hidden}
  .sec>header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .sec>header h2{font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
  .sec>header .n{margin-left:auto;font-size:12px;color:var(--tx3)}
  .dot{width:9px;height:9px;border-radius:99px;background:var(--c,var(--blue));box-shadow:0 0 8px var(--c,var(--blue))}
  .empty{padding:16px;color:var(--tx3);font-size:12.5px}
  table{width:100%;border-collapse:collapse}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12.8px;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tbody tr.clik{cursor:pointer}
  tbody tr.clik:hover td{background:rgba(77,163,255,.09)}
  tbody tr.del td{opacity:.45;text-decoration:line-through}
  .sub{display:block;font-size:11px;color:var(--tx3);margin-top:2px}
  .nowrap{white-space:nowrap}
  .rowbtn{cursor:pointer;background:transparent;border:1px solid var(--line);color:var(--tx3);border-radius:7px;padding:3px 9px;font-size:13px;line-height:1}
  .rowbtn:hover{color:var(--red);border-color:var(--red)}
  .rowbtn.restore:hover{color:var(--green);border-color:var(--green)}
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:700;white-space:nowrap}
  .b-atr{background:rgba(255,92,108,.16);color:var(--red);border:1px solid rgba(255,92,108,.45)}
  .b-hoje{background:rgba(255,180,84,.16);color:var(--amber);border:1px solid rgba(255,180,84,.45)}
  .b-pen{background:rgba(77,163,255,.14);color:var(--blue);border:1px solid rgba(77,163,255,.4)}
  .b-ok{background:rgba(61,220,151,.14);color:var(--green);border:1px solid rgba(61,220,151,.4)}
  .b-sp{background:rgba(122,134,153,.16);color:var(--gray);border:1px solid rgba(122,134,153,.45)}
  .b-and{background:rgba(255,180,84,.16);color:var(--amber);border:1px solid rgba(255,180,84,.45)}
  .b-canc{background:rgba(122,134,153,.16);color:var(--gray);border:1px solid rgba(122,134,153,.45)}
  .b-del{background:rgba(255,92,108,.12);color:var(--red);border:1px dashed rgba(255,92,108,.5)}
  .plat{display:inline-block;padding:2px 9px;border-radius:6px;font-size:10px;font-weight:800;white-space:nowrap}
  .p-ANDINA{background:rgba(47,111,208,.2);color:#3f80d8}.p-SOUTHCONE{background:rgba(30,158,106,.18);color:#149a63}
  .p-MEX{background:rgba(200,134,44,.2);color:#b3781f}.p-CORP{background:rgba(122,95,192,.2);color:#7a5fc0}
  body:not(.light) .p-ANDINA{color:#79b0f5}body:not(.light) .p-SOUTHCONE{color:#4fd6a2}body:not(.light) .p-MEX{color:#f0b45e}body:not(.light) .p-CORP{color:#c3a8f7}
  .late{color:var(--red);font-weight:700}.soon{color:var(--amber);font-weight:700}.okc{color:var(--green)}.muted{color:var(--tx3)}
  .pill{display:inline-block;width:8px;height:8px;border-radius:99px;margin-left:5px;vertical-align:middle}
  .pill.c{background:var(--blue)}.pill.p{background:var(--amber)}
  .pcard{border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:14px;overflow:hidden}
  .pcard>.head{padding:14px 18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;cursor:pointer;background:var(--panel2)}
  .pcard>.head:hover{background:var(--line)}
  .pcard .t{font-size:14.5px;font-weight:700}.pcard .who{font-size:12px;color:var(--tx2)}
  .pcard .right{margin-left:auto;display:flex;gap:18px;align-items:center}
  .bar{position:relative;width:200px;height:9px;border-radius:99px;background:var(--line)}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:99px;background:linear-gradient(90deg,#2f6fd0,#4da3ff)}
  .bar .fill.bad{background:linear-gradient(90deg,#d04a58,#ff5c6c)}.bar .fill.good{background:linear-gradient(90deg,#1e9e6a,#3ddc97)}
  .bar .mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:#ffb454}
  .pct{font-size:15px;font-weight:800;min-width:46px;text-align:right}
  .pcard .body{display:none;border-top:1px solid var(--line)}.pcard.open .body{display:block}
  .caret{color:var(--tx3);font-size:11px;transition:.2s}.pcard.open .caret{transform:rotate(90deg)}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .person{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .person .nm{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .av{width:42px;height:42px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .person h3{font-size:14px}.person .role{font-size:11px;color:var(--tx2)}
  .person .stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .stat{flex:1;min-width:70px;background:var(--panel2);border-radius:8px;padding:8px;text-align:center}
  .stat .v{font-size:18px;font-weight:800}.stat .l{font-size:9.5px;color:var(--tx3);text-transform:uppercase}
  .person .mail{font-size:11px;color:var(--tx3);margin-top:10px;word-break:break-all}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:1000px){.grid2{grid-template-columns:1fr}.bar{width:130px}}
  .footer{margin-top:26px;text-align:center;font-size:11px;color:var(--tx3)}
  .ovl{position:fixed;inset:0;background:rgba(6,10,18,.72);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
  .ovl.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:720px;box-shadow:0 24px 60px var(--shadow)}
  .modal>.mh{display:flex;align-items:flex-start;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line);background:var(--panel2);border-radius:16px 16px 0 0;position:sticky;top:0}
  .modal .mh h2{font-size:16px;font-weight:700;line-height:1.3}
  .modal .mh .x{margin-left:auto;cursor:pointer;color:var(--tx2);font-size:24px;line-height:1;padding:0 4px}
  .modal .mh .x:hover{color:var(--tx)}
  .modal .mb{padding:20px 22px}
  .fieldrow{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .field{flex:1;min-width:150px}
  .field.full{flex-basis:100%}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:4px}
  .field .val{font-size:13.5px}
  .field input,.field select,.field textarea{width:100%}
  .block{border-top:1px solid var(--line);margin-top:16px;padding-top:16px}
  .block h3{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx2);margin-bottom:10px}
  .editbox{background:rgba(77,163,255,.06);border:1px solid rgba(77,163,255,.3);border-radius:12px;padding:14px;margin-top:16px}
  .editbox h3{color:var(--blue)}
  .thread{display:flex;flex-direction:column;gap:10px;max-height:240px;overflow-y:auto;margin-bottom:12px}
  .cmt{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .cmt .meta{font-size:10.5px;color:var(--tx3);margin-bottom:3px}.cmt .meta b{color:var(--blue)}
  .cmt .txt{font-size:13px;white-space:pre-wrap}
  .hist{font-size:12px;color:var(--tx2)}
  .hist .h{display:flex;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .hist .h:last-child{border-bottom:none}.hist .h .d{font-weight:700;color:var(--tx);min-width:82px}
  .sugg{background:rgba(255,180,84,.09);border:1px solid rgba(255,180,84,.4);border-radius:10px;padding:12px;margin-bottom:10px}
  .sugg .who{font-size:11px;color:var(--amber);font-weight:700;margin-bottom:5px}
  .sugg .row{font-size:12.5px;margin:3px 0}.sugg .acts{display:flex;gap:8px;margin-top:10px}
  .note{font-size:11.5px;color:var(--tx3);margin-top:6px}
  .modalfoot{display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--line);margin-top:18px;padding-top:16px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e9e6a;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.25s;box-shadow:0 8px 24px var(--shadow)}
  .toast.on{opacity:1}
  .outbar{position:fixed;bottom:18px;right:18px;z-index:90;display:none;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--blue);border-radius:12px;padding:10px 14px;box-shadow:0 10px 30px var(--shadow)}
  .outbar.on{display:flex}
  .outbar .c{background:var(--blue);color:#fff;border-radius:99px;padding:1px 9px;font-weight:700;font-size:12px}
  .helpbox{background:rgba(77,163,255,.07);border:1px solid rgba(77,163,255,.28);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--tx2);margin-bottom:16px}
  .syncok{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap}
  .btn.warnb{color:var(--amber);border-color:var(--amber)}
  /* ---- mobile (celular) ---- */
  @media(max-width:760px){
    .top{padding:10px 12px;gap:8px;flex-wrap:wrap}
    .top .meta{display:none}
    .logo h1{font-size:13px}
    .wrap{padding:12px 10px 70px}
    .kpis{grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px}
    .kpi{padding:10px 12px}.kpi .v{font-size:22px}
    .sec{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .sec table{min-width:640px}
    .pcard .body{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .pcard .body table{min-width:640px}
    .bar{width:80px}
    .ovl{padding:12px 6px}
    .modal .mb{padding:14px 12px}
    .modal>.mh{padding:14px 14px}
    input[type=text]{min-width:110px}
    .tab{padding:8px 12px;font-size:12px}
    .actbar{margin-left:0;flex-wrap:wrap}
  }
</style>
</head>
<body>
<div class="top">
  <div class="logo">
    <div class="mark">RM</div>
    <div><h1>RM LATAM <span>|</span> CONTROL TOWER</h1><small id="subtitle">Revenue Management</small></div>
  </div>
  <div class="right">
    <button class="themebtn" id="themebtn" onclick="toggleTheme()">🌙 Escuro</button>
    <div class="meta" id="meta"></div>
  </div>
</div>
<div class="wrap">
  <div id="helpzone"></div>
  <div class="kpis" id="kpis"></div>
  <div class="tabs" id="tabs"></div>

    <select id="fResp"></select><select id="fStatus"></select><select id="fMes"></select>
    <input type="text" id="fBusca" placeholder="🔍 Buscar...">

  <div id="content"></div>
  <div class="footer" id="footer"></div>
</div>

function fmtY(iso){if(!iso)return '—';const p=String(iso).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function nowStamp(){const d=new Date();const z=n=>('0'+n).slice(-2);return z(d.getDate())+'/'+z(d.getMonth()+1)+'/'+d.getFullYear()+' '+z(d.getHours())+':'+z(d.getMinutes());}
function daysTo(iso){if(!iso)return null;return Math.round((new Date(iso+'T00:00:00')-new Date(DATA.hoje+'T00:00:00'))/86400000);}

function shortNameJS(n){if(!n)return '';n=n.trim();
  if(/^jonathan/i.test(n))return 'Jonathan';if(/^jo.o/i.test(n))return 'João';if(/^caio/i.test(n))return 'Caio';
  if(/^jorge/i.test(n))return 'Jorge';if(/^noe/i.test(n))return 'Noé';if(/^c.sar|^cesar/i.test(n))return 'César';
  if(/^alejandro/i.test(n))return 'Alejandro';if(/^vit.ria|^vitoria/i.test(n))return 'Vitória';return n.split(/\s+/)[0];}

  it.official=it.official||{};it.dateHistory=A(it.dateHistory);it.comments=A(it.comments);it.suggestions=A(it.suggestions);return it;}

function nthBusinessDay(y,m,n){const d=new Date(y,m,1);let c=0;for(;;){const w=d.getDay();if(w!==0&&w!==6){c++;if(c===n)return new Date(d);}d.setDate(d.getDate()+1);}}
function isoOf(d){const z=n=>('0'+n).slice(-2);return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function nextWD(n){const h=new Date(DATA.hoje+'T00:00:00');let d=nthBusinessDay(h.getFullYear(),h.getMonth(),n);if(d<h)d=nthBusinessDay(h.getFullYear(),h.getMonth()+1,n);return isoOf(d);}
function effRot(r){const d=rotDia(r);const n=parseInt(d,10);
  if(!isNaN(n)&&n>=1)return {prazoPad:'WD+'+n,proxPrazo:nextWD(n)};
  return {prazoPad:r.prazoPad,proxPrazo:r.proxPrazo};}
function notDeletedRot(){return A(DATA.rotinas).filter(r=>!rotDeleted(r));}

function effEnt(e){
  if(MODE!=='admin')return {limite:e.limite,recebTxt:e.recebidoTxt,st:e.st,dias:e.dias};
  const ov=ovLookup(e.id),o=ov&&ov.official?ov.official:{};
  const limite=o.limite||e.baseLimite;
  const recebTxt=o.recebido||e.baseRecebTxt||'';
  const statusOv=o.status||'';
  let dias=limite?daysTo(limite):null,st='Pendente';
  if(/cancel/i.test(statusOv))st='Cancelado';
  else if(!!recebTxt||/conclu/i.test(statusOv))st='Concluído';
  else if(!limite)st='Sem prazo';else if(dias<0)st='Atrasado';else if(dias===0)st='Hoje';
  return {limite,recebTxt,st,dias};
}
function effPct(a){if(MODE!=='admin')return a.pct;const ov=ovLookup(a.id);return (ov&&ov.official&&ov.official.pct!=null)?ov.official.pct:a.pct;}
function actStatus(a){const ov=ovLookup(a.id),o=ov&&ov.official?ov.official:{};
  if(/cancel/i.test(o.status||''))return 'Cancelado';
  if(/conclu/i.test(o.status||''))return 'Concluído';
  const pct=effPct(a),prev=a.prev,fim=a.fim;
  if(pct>=0.999)return 'Concluído';if(fim&&daysTo(fim)<0)return 'Atrasado';if(pct<prev-0.001&&prev>0)return 'Abaixo do plano';if(pct>0)return 'Em andamento';return 'Pendente';}

function stBadgeEnt(e){const ef=effEnt(e),st=ef.st;
  const late=(st==='Concluído'&&ef.recebTxt&&ef.limite&&ef.recebTxt>ef.limite);
  if(st==='Concluído')return '<span class="badge b-ok">✔ '+stTxt('Concluído')+(late?' *':'')+'</span>';
  if(st==='Cancelado')return '<span class="badge b-canc">✕ '+stTxt('Cancelado')+'</span>';
  if(st==='Atrasado')return '<span class="badge b-atr">⚠ '+stTxt('Atrasado')+'</span>';
  if(st==='Hoje')return '<span class="badge b-hoje">● '+stTxt('Hoje')+'</span>';
  if(st==='Sem prazo')return '<span class="badge b-sp">'+stTxt('Sem prazo')+'</span>';
  return '<span class="badge b-pen">'+stTxt('Pendente')+'</span>';}
function projBadge(st){
  if(st==='Concluído')return '<span class="badge b-ok">✔ '+stTxt('Concluído')+'</span>';
  if(st==='Cancelado')return '<span class="badge b-canc">✕ '+stTxt('Cancelado')+'</span>';
  if(st==='Atrasado')return '<span class="badge b-atr">⚠ '+stTxt('Atrasado')+'</span>';
  if(st==='Abaixo do plano')return '<span class="badge b-and">▼ '+stTxt('Abaixo do plano')+'</span>';
  if(st==='Em andamento')return '<span class="badge b-pen">▶ '+stTxt('Em andamento')+'</span>';
  return '<span class="badge b-sp">⏳ '+stTxt('Pendente')+'</span>';}
function platTag(p){return '<span class="plat '+(PCLS[p]||'p-CORP')+'">'+esc(p)+'</span>';}
function markers(item){let h='';if(item.nComments)h+='<span class="pill c" title="comentários"></span>';
  if(MODE==='admin'){const ov=ovLookup(item.id);const p=ov?A(ov.suggestions).filter(x=>!x.state||x.state==='pending').length:0;if(p)h+='<span class="pill p" title="sugestões pendentes"></span>';}return h;}
function diasCell(e){const ef=effEnt(e);
  if(ef.st==='Concluído')return '<span class="okc">'+(ef.recebTxt?fmt(ef.recebTxt):'—')+'</span>';
  if(ef.st==='Cancelado')return '<span class="muted">—</span>';
  if(ef.dias==null)return '<span class="muted">—</span>';
  if(ef.dias<0)return '<span class="late">'+Math.abs(ef.dias)+'d</span>';
  if(ef.dias===0)return '<span class="soon">'+(LANG==='es'?'hoy':'hoje')+'</span>';
  if(ef.dias<=7)return '<span class="soon">'+(LANG==='es'?'en ':'em ')+ef.dias+'d</span>';
  return '<span class="muted">'+(LANG==='es'?'en ':'em ')+ef.dias+'d</span>';}

function filtered(){let base=A(DATA.entregaveis).filter(e=>state.showDeleted?true:!entDeleted(e));
  return base.filter(e=>{const ef=effEnt(e);
    if(state.plat!=='TODAS'&&entPlat(e)!==state.plat)return false;

function tabela(itens,vazio){if(!itens.length)return '<div class="empty">'+(vazio||'—')+'</div>';
  let h='<table><thead><tr><th>'+t.thNum+'</th><th>'+t.thResp+'</th><th>'+t.thPlat+'</th><th>'+t.thEnt+'</th><th>'+t.thPrazo+'</th><th>'+t.thStatus+'</th><th>'+t.thSit+'</th>'+thDel()+'</tr></thead><tbody>';

function renderVisao(){
  const f=filtered(),act=ativos(f);
  const g=st=>act.filter(e=>effEnt(e).st===st);
  const atr=g('Atrasado').sort((a,b)=>effEnt(a).dias-effEnt(b).dias);
  const hj=g('Hoje');
  const p7=act.filter(e=>{const x=effEnt(e);return x.st==='Pendente'&&x.dias>=1&&x.dias<=7;});
  const sp=g('Sem prazo');
  const p30=act.filter(e=>{const x=effEnt(e);return x.st==='Pendente'&&x.dias>=8&&x.dias<=30;});
  let h='';
  h+=secao(t.s1,'var(--red)',atr,t.ok1)+secao(t.s2,'var(--amber)',hj,t.ok2)+secao(t.s3,'var(--blue)',p7,t.ok3)+secao(t.s4,'var(--gray)',sp,t.ok4)+secao(t.s5,'var(--purple)',p30,t.ok5);
  const pr=A(DATA.projetos).filter(p=>{const s=projConsolStatus(p);return s==='Atrasado'||s==='Abaixo do plano';});
  if(pr.length){h+='<div class="sec"><header style="--c:var(--red)"><span class="dot" style="--c:var(--red)"></span><h2>'+t.projRisco+'</h2><span class="n">'+pr.length+'</span></header><table><thead><tr><th>'+t.thProj+'</th><th>'+t.thResp+'</th><th>'+t.thPer+'</th><th>'+t.thReal+'</th><th>'+t.thPrev+'</th><th>'+t.thStatus+'</th></tr></thead><tbody>';
    for(const p of pr){const pc=projConsolPct(p);h+='<tr class="clik" ondblclick="setTab(\'proj\')" onclick="setTab(\'proj\')"><td><b>'+esc(p.nome)+'</b></td><td>'+esc(p.curto)+'</td><td class="nowrap">'+fmt(p.inicio)+' → '+fmt(p.fim)+'</td><td><b>'+Math.round(pc*100)+'%</b></td><td class="muted">'+Math.round(p.prev*100)+'%</td><td>'+projBadge(projConsolStatus(p))+'</td></tr>';}
    h+='</tbody></table></div>';}

let fileHandle=null;
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('rmct',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(k);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});}
async function ensureHandle(pick){if(!('showOpenFilePicker' in window))return null;
  if(!fileHandle){try{fileHandle=await idbGet('overlayHandle');}catch(e){}}
  if(!fileHandle&&pick){const[h]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});fileHandle=h;await idbSet('overlayHandle',h);}
  if(fileHandle){let p=await fileHandle.queryPermission({mode:'readwrite'});if(p!=='granted')p=await fileHandle.requestPermission({mode:'readwrite'});if(p!=='granted')return null;}
  return fileHandle;}
async function connectBase(){try{fileHandle=null;await idbSet('overlayHandle',null);const h=await ensureHandle(true);if(h){await syncFromDisk(true);toast('✔ base conectada — data\\board.overlay.json');}}catch(e){toast('❌ '+e.message);}}
/* Lê o overlay do disco e mescla com o que está em memória.
   Regra: o DISCO é a base; só vencem os itens alterados NESTA sessão.
   Assim, uma aba antiga nunca sobrescreve edições salvas por outra aba/dia. */
function mergeFromDisk(disk){
  if(!disk||typeof disk!=='object')return;
  const mem=DATA.overlay;mem.items=mem.items||{};
  const dItems=(disk.items&&typeof disk.items==='object')?disk.items:{};
  const items={};
  for(const id in dItems)items[id]=dItems[id];
  for(const id in mem.items){if(sessionTouched.has(id)||!items[id])items[id]=mem.items[id];}
  const byId={};
  A(disk.newItems).forEach(n=>{if(n&&n.id)byId[n.id]=n;});
  A(mem.newItems).forEach(n=>{if(n&&n.id&&(sessionNewIds.has(n.id)||!byId[n.id]))byId[n.id]=n;});
  mem.items=items;mem.newItems=Object.keys(byId).map(k=>byId[k]);
  if(disk.version!=null)mem.version=disk.version;
}
async function readDisk(h){const f=await h.getFile();const txt=await f.text();if(!txt||!txt.trim())return null;return JSON.parse(txt);}
/* Sincroniza a base do disco para a memória (ao abrir o painel e ao conectar). */
async function syncFromDisk(interactive){
  if(MODE!=='admin'||!('showOpenFilePicker' in window))return false;
  try{
    if(!fileHandle){try{fileHandle=await idbGet('overlayHandle');}catch(e){}}
    if(!fileHandle)return false;
    let p=await fileHandle.queryPermission({mode:'readwrite'});
    if(p!=='granted'&&interactive)p=await fileHandle.requestPermission({mode:'readwrite'});
    if(p!=='granted')return false;
    const embUpd=DATA.overlay.updated||'';
    const disk=await readDisk(fileHandle);
    if(disk){mergeFromDisk(disk);injectNewItems();refreshAll();
      if((disk.updated||'')!==embUpd)toast('🔄 Base sincronizada do disco ('+(disk.updated||'?')+')');}
    baseLoaded=true;renderTabs();
    return true;
  }catch(e){return false;}
}
async function saveOverlay(){
  if('showOpenFilePicker' in window){
    try{
      const h=await ensureHandle(true);
      if(h){
        try{const disk=await readDisk(h);if(disk){mergeFromDisk(disk);injectNewItems();}}catch(e){}
        DATA.overlay.updated=nowStamp();
        const w=await h.createWritable();await w.write(JSON.stringify(DATA.overlay,null,2));await w.close();
        baseLoaded=true;dirty=false;updateSaveHint();refreshAll();toast('💾 '+t.savedOk);return;
      }
    }catch(e){}
  }
  DATA.overlay.updated=nowStamp();
  const blob=new Blob([JSON.stringify(DATA.overlay,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='board.overlay.json';a.click();dirty=false;updateSaveHint();
  alert(LANG==='es'
    ?'⚠ ATENCIÓN: NO se guardó en data\\board.overlay.json.\nEl archivo fue DESCARGADO (carpeta Descargas). Muévelo a data\\ o haz clic en "📂 Dónde guardar" y guarda de nuevo.'
    :'⚠ ATENÇÃO: NÃO gravei em data\\board.overlay.json.\nO arquivo foi BAIXADO (pasta Downloads). Mova-o para a pasta data\\ substituindo o existente, OU clique em "📂 Onde salvar" e salve de novo.');}
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});

function injectNewItems(){A(DATA.overlay.newItems).forEach(ni=>{
  if(!ni||!ni.id)return;
  if(ni.kind==='entregavel'){if(ENTBY[ni.id])return;const e=entFromNew(ni);DATA.entregaveis=A(DATA.entregaveis);DATA.entregaveis.push(e);ENTBY[ni.id]=e;}
  else if(ni.kind==='rotina'){if(ROTBY[ni.id])return;const r=rotFromNew(ni);DATA.rotinas=A(DATA.rotinas);DATA.rotinas.push(r);ROTBY[ni.id]=r;}
  else if(ni.kind==='projeto'){if(ACTBY[ni.id])return;const a=actFromNew(ni);let p=A(DATA.projetos).find(x=>x.nome===ni.projeto);
    if(!p){p={id:'NP_'+ni.id,nome:ni.projeto||'(novo projeto)',resp:a.resp,curto:a.curto,inicio:a.inicio,fim:a.fim,pct:0,prev:0,st:'Pendente',marco:'',coment:'',obs:'',plat:'CORP',atividades:[]};DATA.projetos=A(DATA.projetos);DATA.projetos.push(p);}
    p.atividades=A(p.atividades);p.atividades.push(a);ACTBY[ni.id]=a;}
});}
function rotFromNew(ni){const d=(ni.diaUtil!=null&&ni.diaUtil!=='')?parseInt(ni.diaUtil,10):null;
  return {id:ni.id,ativ:ni.ativ||'',period:ni.period||'Mensal',resp:ni.resp||'',curto:shortNameJS(ni.resp||''),regionais:'',startPad:'',prazoPad:(d?'WD+'+d:''),proxStart:null,proxPrazo:(d?nextWD(d):null),prio:'',obs:'',deleted:false,diaUtil:d,comments:[],nComments:0,nPending:0};}
function entFromNew(ni){return {id:ni.id,tipo:'entregavel',n:ni.n||'',resp:ni.resp||'',curto:shortNameJS(ni.resp||''),plat:ni.plat||'CORP',material:ni.material||'',deleted:false,ref:ni.ref||'',limite:ni.limite||null,baseLimite:ni.limite||null,recebido:null,recebidoTxt:'',baseRecebTxt:'',st:'Pendente',dias:null,lateDone:false,coment:'',obs:'',mes:ni.mes||'',privado:'Não',comments:[],dateHistory:ni.limite?[{date:ni.limite,ts:ni.createdTs||'',by:'Sistema',note:'Ação criada no sistema'}]:[],nComments:0,nPending:0};}
function actFromNew(ni){const pct=ni.pct!=null?ni.pct:0;let prev=0;
  if(ni.inicio&&ni.fim){const i=new Date(ni.inicio+'T00:00:00'),f=new Date(ni.fim+'T00:00:00'),hh=new Date(DATA.hoje+'T00:00:00');if(f>=i){prev=((hh-i)/86400000+1)/((f-i)/86400000+1);prev=Math.max(0,Math.min(1,prev));}}
  return {id:ni.id,tipo:'projeto-ativ',num:ni.num||'',fase:ni.fase||'',ativ:ni.ativ||'',resp:ni.resp||'',curto:shortNameJS(ni.resp||''),deleted:false,inicio:ni.inicio||null,fim:ni.fim||null,baseFim:ni.fim||null,pct:pct,basePct:pct,prev:prev,st:'Pendente',marco:ni.marco||'',prio:ni.prio||'',coment:'',obs:'',comments:[],dateHistory:ni.fim?[{date:ni.fim,ts:ni.createdTs||'',by:'Sistema',note:'Ação criada no sistema'}]:[],nComments:0,nPending:0};}

function nameList(){return '<datalist id="dlNames">'+A(DATA.time).map(x=>'<option value="'+esc(x.nome)+'">').join('')+A(['Jonathan Braga','João Bruno','Caio Sestari']).map(n=>'<option value="'+esc(n)+'">').join('')+'</datalist>';}
function projList(){return '<datalist id="dlProj">'+A(DATA.projetos).map(p=>'<option value="'+esc(p.nome)+'">').join('')+'</datalist>';}
function typeToggle(kind){return '<div class="fieldrow"><div class="field full"><label>'+t.fType+'</label>'
  +'<button class="btn sm'+(kind==='entregavel'?' primary':'')+'" onclick="openCreate(\'entregavel\')">'+t.tEnt+'</button> '
  +'<button class="btn sm'+(kind==='projeto'?' primary':'')+'" onclick="openCreate(\'projeto\')">'+t.tProj+'</button> '
  +'<button class="btn sm'+(kind==='rotina'?' primary':'')+'" onclick="openCreate(\'rotina\')">'+t.tRot+'</button></div></div>';}
function statusSel(id){return '<select id="'+id+'"><option value="">'+stTxt('Pendente')+'</option><option value="Concluído">'+t.stConcluir+'</option><option value="Cancelado">'+t.stCancel+'</option></select>';}
function openCreate(kind){kind=kind||'entregavel';
  document.getElementById('mTitle').innerHTML='➕ '+t.createTitle;
  let h='<div class="editbox">'+typeToggle(kind)+nameList();
  if(kind==='entregavel'){
    h+='<div class="fieldrow"><div class="field full"><label>'+t.mTexto+' *</label><textarea id="nMat"></textarea></div></div>'
      +'<div class="fieldrow"><div class="field"><label>'+t.mResp+' *</label><input type="text" list="dlNames" id="nResp"></div>'
      +'<div class="field"><label>'+t.mPlat+'</label><select id="nPlat">'+selPlat('CORP')+'</select></div>'
      +'<div class="field"><label>'+t.fRef+'</label><select id="nRef"><option value=""></option><option>Recorrente</option><option>Pontual</option></select></div></div>'
      +'<div class="fieldrow"><div class="field"><label>'+t.fPrazo+'</label><input type="date" id="nDate"></div>'
      +'<div class="field"><label>'+t.fMes+'</label><input type="text" id="nMes" placeholder="ex.: julho"></div>'
      +'<div class="field"><label>'+t.fStatusInicial+'</label>'+statusSel('nStatus')+'</div></div>';
  } else if(kind==='rotina'){
    h+='<div class="fieldrow"><div class="field full"><label>'+t.thAtiv+' *</label><textarea id="nAtiv"></textarea></div></div>'
      +'<div class="fieldrow"><div class="field"><label>'+t.mResp+' *</label><input type="text" list="dlNames" id="nResp"></div>'
      +'<div class="field"><label>'+t.fPeriod+'</label><input type="text" id="nPer" placeholder="ex.: Mensal" value="Mensal"></div>'
      +'<div class="field"><label>'+t.fDiaUtil+' *</label><input type="number" id="nDia" min="1" max="23" step="1" placeholder="ex.: 5"></div></div>';
  } else {
    h+='<div class="fieldrow"><div class="field"><label>'+t.fProjeto+' *</label><input type="text" list="dlProj" id="nProj"></div>'
      +'<div class="field"><label>'+t.fFase+'</label><input type="text" id="nFase" placeholder="ex.: Fase 3: Execução"></div></div>'+projList()
      +'<div class="fieldrow"><div class="field full"><label>'+t.thAtiv+' *</label><textarea id="nAtiv"></textarea></div></div>'
      +'<div class="fieldrow"><div class="field"><label>'+t.mResp+' *</label><input type="text" list="dlNames" id="nResp"></div>'
      +'<div class="field"><label>'+t.fInicio+'</label><input type="date" id="nIni"></div>'
      +'<div class="field"><label>'+t.fFim+'</label><input type="date" id="nFim"></div></div>'
      +'<div class="fieldrow"><div class="field"><label>'+t.thReal+' (0-100)</label><input type="number" id="nPct" min="0" max="100" step="5" value="0"></div>'
      +'<div class="field"><label>'+t.fPrio+'</label><select id="nPrio"><option value=""></option><option>Alta</option><option>Média</option><option>Baixa</option></select></div>'
      +'<div class="field"><label>'+t.fMarco+'</label><select id="nMarco"><option value="">—</option><option value="Sim">Sim</option></select></div>'
      +'<div class="field"><label>'+t.fStatusInicial+'</label>'+statusSel('nStatus')+'</div></div>';
  }
  h+='<div class="fieldrow"><div class="field full"><label>'+t.fComentInit+'</label><textarea id="nComent"></textarea></div></div>'
    +'<div class="modalfoot"><button class="btn green big" onclick="saveNew(\''+kind+'\')">'+t.fCriar+'</button></div></div>';
  document.getElementById('mBody').innerHTML=h;openModal();}
function newId(pfx){return pfx+Date.now()+Math.floor(Math.random()*1000);}
function monthName(iso){if(!iso)return '';try{return new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{month:'long'});}catch(e){return '';}}
function nextProjNum(projName){var proj=A(DATA.projetos).find(x=>x.nome===projName);
  if(!proj)return (A(DATA.projetos).length+1)+'.1';
  var base='',maxSub=0;A(proj.atividades).forEach(a=>{var mm=String(a.num||'').match(/^(\d+)\.(\d+)/);if(mm){base=mm[1];if(+mm[2]>maxSub)maxSub=+mm[2];}});
  if(!base){var first=A(proj.atividades)[0];var pm=first?String(first.num||'').match(/^(\d+)/):null;base=pm?pm[1]:String(A(DATA.projetos).indexOf(proj)+1);}
  return base+'.'+(maxSub+1);}
function saveNew(kind){const val=id=>{const el=document.getElementById(id);return el?(el.value||'').trim():'';};
  const resp=val('nResp');const coment=val('nComent');const status=val('nStatus');
  let ni;
  if(kind==='entregavel'){const material=val('nMat');if(!material||!resp){toast(t.reqMsg);return;}
    const limite=val('nDate');
    let maxN=0;A(DATA.entregaveis).forEach(e=>{const v=parseInt(e.n,10);if(!isNaN(v)&&v>maxN)maxN=v;});
    ni={id:newId('NE'),kind:'entregavel',n:String(maxN+1),material,resp,plat:val('nPlat')||'CORP',ref:val('nRef'),limite:limite||null,recebido:'',status:'',mes:val('nMes')||monthName(limite),privado:'Não',createdBy:USER,createdTs:nowStamp()};
  } else if(kind==='rotina'){const ativ=val('nAtiv');const di=parseInt(val('nDia'),10);
    if(!ativ||!resp||isNaN(di)||di<1){toast(t.reqRot);return;}
    ni={id:newId('NR'),kind:'rotina',ativ,resp,period:val('nPer')||'Mensal',diaUtil:di,createdBy:USER,createdTs:nowStamp()};
  } else {const ativ=val('nAtiv');if(!ativ||!resp){toast(t.reqMsg);return;}
    let pct=parseFloat(val('nPct'));if(isNaN(pct))pct=0;
    const projName=val('nProj')||'(novo projeto)';
    ni={id:newId('NP'),kind:'projeto',projeto:projName,num:nextProjNum(projName),fase:val('nFase'),ativ,resp,inicio:val('nIni')||null,fim:val('nFim')||null,pct:Math.max(0,Math.min(1,pct/100)),marco:val('nMarco'),prio:val('nPrio'),createdBy:USER,createdTs:nowStamp()};
  }
  DATA.overlay.newItems=A(DATA.overlay.newItems);DATA.overlay.newItems.push(ni);
  sessionNewIds.add(ni.id);
  const it=ovItem(ni.id);
  if(status){it.official.status=status;}
  if(coment){it.comments.push({ts:nowStamp(),by:t.adminAuthor,text:coment});}
  // injeta ao vivo
  if(ni.kind==='entregavel'){const e=entFromNew(ni);e.comments=it.comments.slice();e.nComments=e.comments.length;DATA.entregaveis=A(DATA.entregaveis);DATA.entregaveis.push(e);ENTBY[ni.id]=e;}
  else if(ni.kind==='rotina'){const r=rotFromNew(ni);r.comments=it.comments.slice();r.nComments=r.comments.length;DATA.rotinas=A(DATA.rotinas);DATA.rotinas.push(r);ROTBY[ni.id]=r;}
  else{const a=actFromNew(ni);a.comments=it.comments.slice();a.nComments=a.comments.length;let p=A(DATA.projetos).find(x=>x.nome===ni.projeto);if(!p){p={id:'NP_'+ni.id,nome:ni.projeto,resp:a.resp,curto:a.curto,inicio:a.inicio,fim:a.fim,pct:0,prev:0,st:'Pendente',marco:'',coment:'',obs:'',plat:'CORP',atividades:[]};DATA.projetos=A(DATA.projetos);DATA.projetos.push(p);}p.atividades=A(p.atividades);p.atividades.push(a);ACTBY[ni.id]=a;}
  markDirty(ni.id);refreshAll();toast(t.created);saveOverlay();
  if(ni.kind==='entregavel')openEnt(ni.id);else if(ni.kind==='rotina')openRot(ni.id);else openAct(ni.id);}

/* ---------- init ---------- */
function init(){
  let th='dark';try{th=localStorage.getItem('rm_theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');}catch(e){}
  applyTheme(th);
  document.getElementById('subtitle').textContent=(MODE==='view')?t.viewSub+' — '+USER:t.sub;
  document.title=(MODE==='view'?'Meu Painel — '+USER:'RM Control Tower — Admin');
  const flag=(MODE==='admin')?'<span class="modeflag flag-admin">ADMIN · '+esc(USER)+'</span>':'<span class="modeflag flag-view">'+esc(USER)+(LANG==='es'?' · vista':' · visão')+'</span>';
  document.getElementById('meta').innerHTML=flag+'<br>'+(LANG==='es'?'Planilla-semente':'Planilha-semente')+': '+esc(DATA.fonte)+'<br>'+(LANG==='es'?'Generado':'Gerado')+': <b>'+esc(DATA.gerado)+'</b>';
  document.getElementById('helpzone').innerHTML='<div class="helpbox">'+((MODE==='admin')?t.helpAdmin:t.helpView)+'</div>';
  document.getElementById('footer').textContent='Sistema de Mapeo · Revenue Management LatAm';
  document.getElementById('lblPlat').textContent=t.plat;
  document.getElementById('fBusca').placeholder='🔍 '+t.busca;
  const resps=[...new Set(A(DATA.entregaveis).map(e=>entCurto(e)))].sort();
  document.getElementById('fResp').innerHTML='<option value="">'+t.resp+'</option>'+resps.map(r=>'<option>'+esc(r)+'</option>').join('');
  document.getElementById('fStatus').innerHTML='<option value="">'+t.status+'</option>'+['Atrasado','Hoje','Pendente','Sem prazo','Concluído','Cancelado'].map(s=>'<option value="'+s+'">'+stTxt(s)+'</option>').join('');
  const meses=[...new Set(A(DATA.entregaveis).map(e=>e.mes).filter(Boolean))];
  document.getElementById('fMes').innerHTML='<option value="">'+t.mes+'</option>'+meses.map(m=>'<option>'+esc(m)+'</option>').join('');
  document.getElementById('fResp').onchange=e=>{state.resp=e.target.value;renderContent();};
  document.getElementById('fStatus').onchange=e=>{state.status=e.target.value;renderContent();};
  document.getElementById('fMes').onchange=e=>{state.mes=e.target.value;renderContent();};
  document.getElementById('fBusca').oninput=e=>{state.busca=e.target.value;renderContent();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  renderKpis();renderTabs();renderChips();renderContent();renderOutbar();
}
injectNewItems();
init();
if(MODE==='admin')syncFromDisk(false);
</script>
